naftiko: 1.0.0-alpha2
info:
  label: Aramark Marko API — Revenue
  description: 'Aramark Marko API — Revenue. 1 operations. Lead operation: Aramark Get Revenue Snapshot. Self-contained Naftiko
    capability covering one Aramark business surface.'
  tags:
  - Aramark
  - Revenue
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARAMARK_API_KEY: ARAMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: marko-revenue
    baseUri: https://www.marko.aramark.net/v1
    description: Aramark Marko API — Revenue business capability. Self-contained, no shared references.
    resources:
    - name: revenue-snapshot
      path: /revenue-snapshot
      operations:
      - name: getrevenuesnapshot
        method: GET
        description: Aramark Get Revenue Snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profitCenterId
          in: query
          type: string
          description: Filter by profit center
        - name: startDate
          in: query
          type: string
          description: Start date for revenue period (YYYY-MM-DD)
        - name: endDate
          in: query
          type: string
          description: End date for revenue period (YYYY-MM-DD)
    authentication:
      type: apikey
      key: apiKey
      value: '{{env.ARAMARK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: marko-revenue-rest
    port: 8080
    description: REST adapter for Aramark Marko API — Revenue. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/revenue-snapshot
      name: revenue-snapshot
      description: REST surface for revenue-snapshot.
      operations:
      - method: GET
        name: getrevenuesnapshot
        description: Aramark Get Revenue Snapshot
        call: marko-revenue.getrevenuesnapshot
        with:
          profitCenterId: rest.profitCenterId
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marko-revenue-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aramark Marko API — Revenue. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: aramark-get-revenue-snapshot
      description: Aramark Get Revenue Snapshot
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marko-revenue.getrevenuesnapshot
      with:
        profitCenterId: tools.profitCenterId
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
