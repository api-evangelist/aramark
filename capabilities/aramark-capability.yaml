naftiko: 1.0.0-alpha2
info:
  label: Aramark Marko API
  description: Marko is Aramark's data and AI platform providing fast, frictionless access to Aramark's robust data universe
    with 70+ services designed to provide realtime insights and streamline business processes.
  tags:
  - Aramark
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: aramark
    baseUri: https://www.marko.aramark.net/v1
    description: Aramark Marko API HTTP API.
    authentication:
      type: apikey
      in: header
      name: apiKey
      value: '{{ARAMARK_TOKEN}}'
    resources:
    - name: organization
      path: /organization
      operations:
      - name: getorganization
        method: GET
        description: Aramark Get Organization Data
        inputParameters:
        - name: locationId
          in: query
          type: string
          description: Filter by location identifier
        - name: orgType
          in: query
          type: string
          description: Filter by organization type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: service
      path: /service
      operations:
      - name: getservice
        method: GET
        description: Aramark Get Service Data
        inputParameters:
        - name: serviceType
          in: query
          type: string
          description: Filter by service type
        - name: locationId
          in: query
          type: string
          description: Filter by location
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: product
      path: /product
      operations:
      - name: getproduct
        method: GET
        description: Aramark Get Product Data
        inputParameters:
        - name: category
          in: query
          type: string
          description: Filter by product category
        - name: locationId
          in: query
          type: string
          description: Filter by location
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: profit-centers
      path: /profit-centers
      operations:
      - name: getprofitcenters
        method: GET
        description: Aramark Get Profit Centers
        inputParameters:
        - name: parentId
          in: query
          type: string
          description: Filter by parent profit center
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: revenue-snapshot
      path: /revenue-snapshot
      operations:
      - name: getrevenuesnapshot
        method: GET
        description: Aramark Get Revenue Snapshot
        inputParameters:
        - name: profitCenterId
          in: query
          type: string
          description: Filter by profit center
        - name: startDate
          in: query
          type: string
          description: Start date for revenue period (YYYY-MM-DD)
        - name: endDate
          in: query
          type: string
          description: End date for revenue period (YYYY-MM-DD)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: point-of-sale
      path: /point-of-sale
      operations:
      - name: getpointofsale
        method: GET
        description: Aramark Get Point of Sale Data
        inputParameters:
        - name: locationId
          in: query
          type: string
          description: Filter by location identifier
        - name: startDate
          in: query
          type: string
          description: Start date (YYYY-MM-DD)
        - name: endDate
          in: query
          type: string
          description: End date (YYYY-MM-DD)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: aramark-rest
    description: REST adapter for Aramark Marko API.
    resources:
    - path: /organization
      name: getorganization
      operations:
      - method: GET
        name: getorganization
        description: Aramark Get Organization Data
        call: aramark.getorganization
        outputParameters:
        - type: object
          mapping: $.
    - path: /service
      name: getservice
      operations:
      - method: GET
        name: getservice
        description: Aramark Get Service Data
        call: aramark.getservice
        outputParameters:
        - type: object
          mapping: $.
    - path: /product
      name: getproduct
      operations:
      - method: GET
        name: getproduct
        description: Aramark Get Product Data
        call: aramark.getproduct
        outputParameters:
        - type: object
          mapping: $.
    - path: /profit-centers
      name: getprofitcenters
      operations:
      - method: GET
        name: getprofitcenters
        description: Aramark Get Profit Centers
        call: aramark.getprofitcenters
        outputParameters:
        - type: object
          mapping: $.
    - path: /revenue-snapshot
      name: getrevenuesnapshot
      operations:
      - method: GET
        name: getrevenuesnapshot
        description: Aramark Get Revenue Snapshot
        call: aramark.getrevenuesnapshot
        outputParameters:
        - type: object
          mapping: $.
    - path: /point-of-sale
      name: getpointofsale
      operations:
      - method: GET
        name: getpointofsale
        description: Aramark Get Point of Sale Data
        call: aramark.getpointofsale
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: aramark-mcp
    transport: http
    description: MCP adapter for Aramark Marko API for AI agent use.
    tools:
    - name: getorganization
      description: Aramark Get Organization Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aramark.getorganization
      with:
        locationId: tools.locationId
        orgType: tools.orgType
      inputParameters:
      - name: locationId
        type: string
        description: Filter by location identifier
      - name: orgType
        type: string
        description: Filter by organization type
      outputParameters:
      - type: object
        mapping: $.
    - name: getservice
      description: Aramark Get Service Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aramark.getservice
      with:
        serviceType: tools.serviceType
        locationId: tools.locationId
      inputParameters:
      - name: serviceType
        type: string
        description: Filter by service type
      - name: locationId
        type: string
        description: Filter by location
      outputParameters:
      - type: object
        mapping: $.
    - name: getproduct
      description: Aramark Get Product Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aramark.getproduct
      with:
        category: tools.category
        locationId: tools.locationId
      inputParameters:
      - name: category
        type: string
        description: Filter by product category
      - name: locationId
        type: string
        description: Filter by location
      outputParameters:
      - type: object
        mapping: $.
    - name: getprofitcenters
      description: Aramark Get Profit Centers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aramark.getprofitcenters
      with:
        parentId: tools.parentId
      inputParameters:
      - name: parentId
        type: string
        description: Filter by parent profit center
      outputParameters:
      - type: object
        mapping: $.
    - name: getrevenuesnapshot
      description: Aramark Get Revenue Snapshot
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aramark.getrevenuesnapshot
      with:
        profitCenterId: tools.profitCenterId
        startDate: tools.startDate
        endDate: tools.endDate
      inputParameters:
      - name: profitCenterId
        type: string
        description: Filter by profit center
      - name: startDate
        type: string
        description: Start date for revenue period (YYYY-MM-DD)
      - name: endDate
        type: string
        description: End date for revenue period (YYYY-MM-DD)
      outputParameters:
      - type: object
        mapping: $.
    - name: getpointofsale
      description: Aramark Get Point of Sale Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aramark.getpointofsale
      with:
        locationId: tools.locationId
        startDate: tools.startDate
        endDate: tools.endDate
      inputParameters:
      - name: locationId
        type: string
        description: Filter by location identifier
      - name: startDate
        type: string
        description: Start date (YYYY-MM-DD)
      - name: endDate
        type: string
        description: End date (YYYY-MM-DD)
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    ARAMARK_TOKEN: ARAMARK_TOKEN
