naftiko: 1.0.0-alpha2
info:
  label: Aramark Marko API — Profit Centers
  description: 'Aramark Marko API — Profit Centers. 1 operations. Lead operation: Aramark Get Profit Centers. Self-contained
    Naftiko capability covering one Aramark business surface.'
  tags:
  - Aramark
  - Profit Centers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARAMARK_API_KEY: ARAMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: marko-profit-centers
    baseUri: https://www.marko.aramark.net/v1
    description: Aramark Marko API — Profit Centers business capability. Self-contained, no shared references.
    resources:
    - name: profit-centers
      path: /profit-centers
      operations:
      - name: getprofitcenters
        method: GET
        description: Aramark Get Profit Centers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parentId
          in: query
          type: string
          description: Filter by parent profit center
    authentication:
      type: apikey
      key: apiKey
      value: '{{env.ARAMARK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: marko-profit-centers-rest
    port: 8080
    description: REST adapter for Aramark Marko API — Profit Centers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/profit-centers
      name: profit-centers
      description: REST surface for profit-centers.
      operations:
      - method: GET
        name: getprofitcenters
        description: Aramark Get Profit Centers
        call: marko-profit-centers.getprofitcenters
        with:
          parentId: rest.parentId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marko-profit-centers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aramark Marko API — Profit Centers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: aramark-get-profit-centers
      description: Aramark Get Profit Centers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marko-profit-centers.getprofitcenters
      with:
        parentId: tools.parentId
      outputParameters:
      - type: object
        mapping: $.
