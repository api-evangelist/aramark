naftiko: 1.0.0-alpha2
info:
  label: Aramark Marko API — Point of Sale
  description: 'Aramark Marko API — Point of Sale. 1 operations. Lead operation: Aramark Get Point of Sale Data. Self-contained
    Naftiko capability covering one Aramark business surface.'
  tags:
  - Aramark
  - Point of Sale
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARAMARK_API_KEY: ARAMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: marko-point-of-sale
    baseUri: https://www.marko.aramark.net/v1
    description: Aramark Marko API — Point of Sale business capability. Self-contained, no shared references.
    resources:
    - name: point-of-sale
      path: /point-of-sale
      operations:
      - name: getpointofsale
        method: GET
        description: Aramark Get Point of Sale Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: locationId
          in: query
          type: string
          description: Filter by location identifier
        - name: startDate
          in: query
          type: string
          description: Start date (YYYY-MM-DD)
        - name: endDate
          in: query
          type: string
          description: End date (YYYY-MM-DD)
    authentication:
      type: apikey
      key: apiKey
      value: '{{env.ARAMARK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: marko-point-of-sale-rest
    port: 8080
    description: REST adapter for Aramark Marko API — Point of Sale. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/point-of-sale
      name: point-of-sale
      description: REST surface for point-of-sale.
      operations:
      - method: GET
        name: getpointofsale
        description: Aramark Get Point of Sale Data
        call: marko-point-of-sale.getpointofsale
        with:
          locationId: rest.locationId
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marko-point-of-sale-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aramark Marko API — Point of Sale. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: aramark-get-point-sale-data
      description: Aramark Get Point of Sale Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marko-point-of-sale.getpointofsale
      with:
        locationId: tools.locationId
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
