naftiko: 1.0.0-alpha2
info:
  label: Aramark Marko API — Product
  description: 'Aramark Marko API — Product. 1 operations. Lead operation: Aramark Get Product Data. Self-contained Naftiko
    capability covering one Aramark business surface.'
  tags:
  - Aramark
  - Product
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARAMARK_API_KEY: ARAMARK_API_KEY
capability:
  consumes:
  - type: http
    namespace: marko-product
    baseUri: https://www.marko.aramark.net/v1
    description: Aramark Marko API — Product business capability. Self-contained, no shared references.
    resources:
    - name: product
      path: /product
      operations:
      - name: getproduct
        method: GET
        description: Aramark Get Product Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: category
          in: query
          type: string
          description: Filter by product category
        - name: locationId
          in: query
          type: string
          description: Filter by location
    authentication:
      type: apikey
      key: apiKey
      value: '{{env.ARAMARK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: marko-product-rest
    port: 8080
    description: REST adapter for Aramark Marko API — Product. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/product
      name: product
      description: REST surface for product.
      operations:
      - method: GET
        name: getproduct
        description: Aramark Get Product Data
        call: marko-product.getproduct
        with:
          category: rest.category
          locationId: rest.locationId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marko-product-mcp
    port: 9090
    transport: http
    description: MCP adapter for Aramark Marko API — Product. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: aramark-get-product-data
      description: Aramark Get Product Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marko-product.getproduct
      with:
        category: tools.category
        locationId: tools.locationId
      outputParameters:
      - type: object
        mapping: $.
