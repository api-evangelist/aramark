description: FOCUS-aligned FinOps placeholder for Aramark. No public billing-model details, meters, or
  invoice schema are published; this artifact records the absence so consumers know to source commercial
  terms from the provider directly.
notes: Aramark's Marko developer portal exposes a 70+ service catalog but does not publish pricing, plan
  tiers, or commercial terms. Access appears to be partner/internal — pricing, if any, is negotiated rather
  than self-serve.
